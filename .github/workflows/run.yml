
  name: Run codex_register
  on:
    workflow_dispatch:
      inputs:
        count:
          description: "How many to run"
          required: true
          default: "10"
    push:
      branches: [ "main" ]

  jobs:
    run:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - run: pip install -r requirements.txt
          if: ${{ hashFiles('requirements.txt') != '' }}
        - run: python codex_register.py --count ${{ inputs.count }} --workers 1
